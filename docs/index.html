"http://www.opengis.net/def/function/geosparql/ext/above":`PREFIX my: <http://example.org/ApplicationSchema#>
PREFIX geo: <http://www.opengis.net/ont/geosparql#>
PREFIX geof: <http://www.opengis.net/def/function/geosparql/ext/>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
SELECT ?geom1 ?geom2 (xsd:boolean(?abovee) as ?above) (xsd:boolean(?nabovee) as ?notabove)
WHERE {
  my:A geo:hasDefaultGeometry ?aGeom .
  ?aGeom geo:asWKT ?geom1 .
  BIND("Polygon((-83.3 33.0, -83.1 33.0, -83.1 33.2, -83.3 33.2, -83.3 33.0))"^^geo:wktLiteral AS ?geom2)
  BIND (geof:above(?geom1, ?geom2) as ?nabovee)
  BIND (geof:above(?geom2, ?geom1) as ?abovee)
}`,
"http://www.opengis.net/def/function/geosparql/area":`PREFIX my: <http://example.org/ApplicationSchema#>

PREFIX geof: <http://www.opengis.net/def/function/geosparql/>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
SELECT ?aLiteral ?area
WHERE {
  my:A geo:hasDefaultGeometry ?aGeom .
  ?aGeom geo:asWKT ?aLiteral .
  BIND (geof:area(?aLiteral,"http://qudt.org/vocab/unit/AC"^^xsd:anyURI) as ?area)
}`,

"http://www.opengis.net/def/function/geosparql/ext/below":`PREFIX my: <http://example.org/ApplicationSchema#>
PREFIX geo: <http://www.opengis.net/ont/geosparql#>
PREFIX geof: <http://www.opengis.net/def/function/geosparql/ext/>
